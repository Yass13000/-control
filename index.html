<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuBoard Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .wall-box { border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        .screen { background: #1e293b; border: 2px solid #3b82f6; border-radius: 12px; height: 120px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-direction: column; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto space-y-8">
        
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-black italic tracking-tighter">PILOTAGE <span class="text-blue-500 text-4xl">MUR</span></h1>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Configuration 2 Écrans</p>
        </header>

        <div class="wall-box bg-slate-900/50 space-y-4">
            <p class="text-[10px] text-center font-bold text-gray-400 uppercase">Aperçu de ton mur</p>
            <div class="grid grid-cols-2 gap-3">
                <div class="screen text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                    <span class="text-xs opacity-50 uppercase">Écran</span>
                    GAUCHE
                </div>
                <div class="screen text-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                    <span class="text-xs opacity-50 uppercase">Écran</span>
                    DROITE
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 ml-1">LIEN VIDÉO GOOGLE DRIVE</label>
                <input id="videoUrl" type="text" placeholder="Coller le lien ici..." 
                    class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition-all">
            </div>

            <button onclick="repairAndSync()" id="btnSync"
                class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/40 active:scale-95 transition-all">
                SYNCHRONISER LE MUR
            </button>
        </div>

        <div id="status" class="text-center text-xs text-gray-500 font-medium">
            Prêt pour la diffusion
        </div>

    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        async function repairAndSync() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btnSync');
            const status = document.getElementById('status');

            if (!url) {
                alert("Erreur : Colle d'abord une URL !");
                return;
            }

            // UI Feedback
            btn.innerText = "SYNCHRONISATION...";
            btn.classList.replace('bg-blue-600', 'bg-slate-700');

            try {
                // 1. On force l'écran de GAUCHE (pos_x = 0, total_cols = 2)
                await sbClient.from('screens_config').update({ 
                    video_url: url, 
                    total_cols: 2, 
                    total_rows: 1, 
                    pos_x: 0, 
                    pos_y: 0 
                }).eq('id', 'ecran_gauche');

                // 2. On force l'écran de DROITE (pos_x = 1, total_cols = 2)
                await sbClient.from('screens_config').update({ 
                    video_url: url, 
                    total_cols: 2, 
                    total_rows: 1, 
                    pos_x: 1, 
                    pos_y: 0 
                }).eq('id', 'ecran_droite');

                status.innerText = "✨ Mur synchronisé avec succès !";
                status.classList.add('text-emerald-400');
                
            } catch (e) {
                status.innerText = "❌ Erreur Supabase";
            } finally {
                btn.innerText = "SYNCHRONISER LE MUR";
                btn.classList.replace('bg-slate-700', 'bg-blue-600');
                setTimeout(() => { status.innerText = "Prêt pour la diffusion"; status.classList.remove('text-emerald-400'); }, 3000);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuBoard Studio | Architecte 2x2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Thème Premium : Fond Ardoise, Texte Blanc */
        body { background: #4C5454; color: #FFFFFF; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Effet Verre Ultra Épuré */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        ::-webkit-scrollbar { display: none; }
        
        /* Animation avec la nouvelle couleur Corail */
        @keyframes pulse-accent {
            0% { box-shadow: 0 0 0 0 rgba(255, 113, 91, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 113, 91, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 113, 91, 0); }
        }
        .updating { animation: pulse-accent 1s ease-out; }
    </style>
</head>
<body class="p-4 pb-20">

    <main class="max-w-2xl mx-auto space-y-10">
        
        <section class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-black uppercase tracking-[0.2em] text-[#FF715B] italic">Configuration Mur</h2>
                <select id="gridSelect" onchange="createGrid()" class="bg-white/10 text-white text-[10px] font-bold p-2 rounded-lg border border-white/10 outline-none cursor-pointer hover:bg-white/20 transition-all">
                    <option value="1x2" class="bg-[#4C5454]">MUR 1x2</option>
                    <option value="1x3" class="bg-[#4C5454]">MUR 1x3</option>
                    <option value="1x4" class="bg-[#4C5454]">MUR 1x4</option>
                    <option value="2x2" selected class="bg-[#4C5454]">MUR 2x2 (Carré)</option>
                </select>
            </div>

            <div id="wallGrid" class="grid gap-3 min-h-[160px]"></div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-white/50 uppercase ml-2">URL Vidéo (Le lien Drive sera nettoyé auto)</label>
                <input id="videoUrl" type="text" placeholder="https://drive.google.com/..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:border-[#FF715B] outline-none transition-all font-mono text-white placeholder-white/30">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="applyConfig()" class="bg-[#FF715B] hover:opacity-90 text-white py-4 rounded-2xl font-black text-xs uppercase transition-all shadow-lg shadow-[#FF715B]/20 active:scale-95">
                    🚀 Déployer au Live
                </button>
                <button onclick="saveAsPreset()" class="bg-white/5 hover:bg-white/10 text-white py-4 rounded-2xl font-black text-xs uppercase transition-all border border-white/10 active:scale-95">
                    💾 Sauver Preset
                </button>
            </div>
        </section>

        <hr class="border-white/10">

        <section class="space-y-4">
            <h2 class="text-sm font-black uppercase tracking-[0.2em] text-[#FF715B] italic">Live Status</h2>
            <div id="liveList" class="space-y-3">
                <p class="text-center text-xs text-white/40 animate-pulse">Connexion à Supabase...</p>
            </div>
        </section>

        <section class="space-y-4 pb-10">
            <h2 class="text-sm font-black uppercase tracking-[0.2em] text-[#FF715B] italic">Bibliothèque</h2>
            <div id="presetList" class="grid grid-cols-2 gap-3"></div>
        </section>

    </main>

    <div id="modal" class="fixed inset-0 bg-[#4C5454]/95 hidden items-center justify-center p-6 z-50 backdrop-blur-md">
        <div class="glass w-full max-w-xs rounded-3xl p-6 space-y-4 shadow-2xl">
            <h3 class="text-center text-xs font-black uppercase text-white/60">Assigner un écran</h3>
            <div id="screenList" class="space-y-2 max-h-[300px] overflow-y-auto pr-1"></div>
            <button onclick="closeModal()" class="w-full text-[10px] font-bold py-3 text-white/50 uppercase hover:text-white transition-all">Annuler</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let currentAssignments = {};
        let targetSlot = null;

        // --- DÉMARRAGE ---
        async function init() {
            const { data, error } = await sbClient.from('screens_config').select('*');
            if(error) console.error(error);
            availableScreens = data || [];
            
            setupRealtime();
            renderLiveStatus();
            renderPresets();
            createGrid();
        }

        // --- REALTIME (UNE SEULE FOIS) ---
        function setupRealtime() {
            sbClient.channel('any').on('postgres_changes', 
                { event: '*', schema: 'public', table: 'screens_config' }, 
                (payload) => {
                    const { eventType, new: newRow, old: oldRow } = payload;
                    if (eventType === 'DELETE') {
                        availableScreens = availableScreens.filter(s => s.id !== oldRow.id);
                    } else if (eventType === 'INSERT') {
                        availableScreens.push(newRow);
                    } else {
                        const idx = availableScreens.findIndex(s => s.id === newRow.id);
                        if(idx !== -1) availableScreens[idx] = newRow;
                    }
                    renderLiveStatus();
                }
            ).subscribe();
        }

        // --- GRILLE DYNAMIQUE (1D ou 2D) ---
        function createGrid() {
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            const container = document.getElementById('wallGrid');
            
            container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            container.innerHTML = '';

            for(let i=0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                const div = document.createElement('div');
                div.className = `aspect-video border-2 border-dashed rounded-2xl flex flex-col items-center justify-center p-2 cursor-pointer transition-all ${screenId ? 'border-[#FF715B] bg-[#FF715B]/10' : 'border-white/20 text-white/40 hover:border-white/40'}`;
                
                div.innerHTML = screenId 
                    ? `<span class="text-[8px] text-[#FF715B] font-bold uppercase mb-1">Slot ${i}</span>
                       <span class="text-[10px] font-black text-white truncate w-full text-center">${screenId}</span>`
                    : `<span class="text-[10px] uppercase font-bold">Vide</span>`;
                
                div.onclick = () => openModal(i);
                container.appendChild(div);
            }
        }

        // --- MODAL ---
        function openModal(slotIdx) {
            targetSlot = slotIdx;
            const list = document.getElementById('screenList');
            list.innerHTML = availableScreens.length ? availableScreens.map(s => `
                <button onclick="assign('${s.id}')" class="w-full bg-white/5 hover:bg-[#FF715B] p-4 rounded-2xl text-left text-[10px] font-black uppercase transition-all border border-white/10 text-white">
                    ${s.id}
                </button>
            `).join('') : '<p class="text-[10px] text-center text-white/50 py-4">Aucun écran détecté</p>';
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(id) {
            currentAssignments[targetSlot] = id;
            closeModal();
            createGrid();
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // --- DÉPLOIEMENT ---
        async function applyConfig() {
            let url = document.getElementById('videoUrl').value.trim();
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            const totalSlots = rows * cols;

            if(!url) return alert("Veuillez entrer une URL vidéo");

            // NETTOYAGE AUTO GOOGLE DRIVE
            if (url.includes("drive.google.com") && url.includes("/d/")) {
                try {
                    const id = url.split("/d/")[1].split("/")[0];
                    url = `https://drive.google.com/uc?export=download&id=${id}`;
                    document.getElementById('videoUrl').value = url; // Met à jour le champ pour que l'utilisateur le voie
                } catch(e) {
                    console.log("Erreur parsing lien Drive", e);
                }
            }

            let updatesCount = 0;

            // On boucle UNIQUEMENT sur les slots visibles de la grille
            for(let i = 0; i < totalSlots; i++) {
                const screenId = currentAssignments[i];
                
                if(screenId) {
                    const posX = i % cols;
                    const posY = Math.floor(i / cols);

                    await sbClient.from('screens_config').update({
                        video_url: url,
                        total_cols: cols,
                        total_rows: rows,
                        pos_x: posX,
                        pos_y: posY
                    }).eq('id', screenId);
                    
                    updatesCount++;
                }
            }
            
            if(updatesCount === 0) return alert("Assignez au moins un écran avant de déployer !");
            alert("✅ Configuration envoyée aux écrans !");
        }

        // --- RESET UN ÉCRAN (Détacher du mur) ---
        async function resetScreen(id) {
            if(!confirm(`Détacher l'écran ${id} du mur et le remettre à zéro ?`)) return;
            
            // On remet la config de base dans Supabase
            await sbClient.from('screens_config').update({ 
                total_cols: 1, 
                total_rows: 1,
                pos_x: 0, 
                pos_y: 0,
                video_url: '' 
            }).eq('id', id);
            
            // On le retire de nos assignations locales s'il y était
            for(let key in currentAssignments) {
                if(currentAssignments[key] === id) delete currentAssignments[key];
            }
            createGrid(); // Rafraîchit le visuel
        }

        // --- AFFICHAGE LIVE ---
        function renderLiveStatus() {
            const container = document.getElementById('liveList');
            container.innerHTML = availableScreens.map(s => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 ${s.total_cols > 1 || s.total_rows > 1 ? 'border-[#FF715B] bg-[#FF715B]/5' : 'border-white/10 opacity-60'}">
                    <div class="space-y-1">
                        <p class="text-xs font-black uppercase tracking-tighter text-white">${s.id}</p>
                        <p class="text-[9px] text-white/50 font-mono truncate w-40">${s.video_url || 'En attente...'}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-white/60 uppercase">${s.total_cols}x${s.total_rows}</p>
                            <p class="text-[10px] font-black text-[#FF715B] uppercase">X:${s.pos_x} Y:${s.pos_y}</p>
                        </div>
                        <button onclick="resetScreen('${s.id}')" class="bg-white/5 text-white/50 p-2 rounded-lg text-[10px] hover:bg-[#FF715B] hover:text-white transition-all" title="Détacher cet écran">✕</button>
                    </div>
                </div>
            `).join('');
        }

        // --- PRESETS (LOCAL) ---
        function renderPresets() {
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            const container = document.getElementById('presetList');
            if(presets.length === 0) {
                container.innerHTML = '<p class="col-span-2 text-center text-[10px] text-white/40 italic py-4">Aucun preset sauvegardé</p>';
                return;
            }
            container.innerHTML = presets.map((p, idx) => `
                <div class="glass p-4 rounded-2xl border border-white/10 space-y-3">
                    <p class="text-[9px] font-black uppercase truncate text-[#FF715B]">${p.name}</p>
                    <div class="flex gap-2">
                        <button onclick="loadPreset(${idx})" class="flex-1 bg-white/5 text-white py-2 rounded-xl text-[9px] font-bold uppercase hover:bg-[#FF715B] transition-all">Lire</button>
                        <button onclick="deletePreset(${idx})" class="bg-white/5 text-white/50 px-3 rounded-xl text-[10px] hover:bg-[#FF715B] hover:text-white transition-all">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function saveAsPreset() {
            const name = prompt("Nom du Preset :");
            if(!name) return;
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            presets.push({
                name,
                url: document.getElementById('videoUrl').value,
                grid: document.getElementById('gridSelect').value,
                assign: currentAssignments
            });
            localStorage.setItem('mb_presets', JSON.stringify(presets));
            renderPresets();
        }

        function loadPreset(idx) {
            const p = JSON.parse(localStorage.getItem('mb_presets'))[idx];
            document.getElementById('videoUrl').value = p.url;
            document.getElementById('gridSelect').value = p.grid;
            currentAssignments = p.assign;
            createGrid();
        }

        function deletePreset(idx) {
            let p = JSON.parse(localStorage.getItem('mb_presets'));
            p.splice(idx, 1);
            localStorage.setItem('mb_presets', JSON.stringify(p));
            renderPresets();
        }

        init();
    </script>
</body>
</html>

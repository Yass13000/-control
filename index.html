<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuBoard Studio | Architecte 2x2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { display: none; }
        
        /* Animation pour les mises à jour live */
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .updating { animation: pulse-blue 1s ease-out; }
    </style>
</head>
<body class="p-4 pb-20">

    <main class="max-w-2xl mx-auto space-y-10">
        
        <section class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-black uppercase tracking-[0.2em] text-blue-500 italic">Configuration Mur</h2>
                <select id="gridSelect" onchange="createGrid()" class="bg-slate-800 text-[10px] font-bold p-2 rounded-lg border-none outline-none ring-1 ring-slate-700">
                    <option value="1x2">MUR 1x2</option>
                    <option value="1x3">MUR 1x3</option>
                    <option value="1x4">MUR 1x4</option>
                    <option value="2x2" selected>MUR 2x2 (Carré)</option>
                </select>
            </div>

            <div id="wallGrid" class="grid gap-3 min-h-[160px]"></div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">URL Vidéo (Google Drive Direct)</label>
                <input id="videoUrl" type="text" placeholder="https://drive.google.com/uc?export=download&id=..." 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-sm focus:border-blue-500 outline-none transition-all font-mono text-blue-300">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="applyConfig()" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-xs uppercase transition-all shadow-lg shadow-blue-900/40 active:scale-95">
                    🚀 Déployer au Live
                </button>
                <button onclick="saveAsPreset()" class="bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-black text-xs uppercase transition-all border border-slate-700 active:scale-95">
                    💾 Sauver Preset
                </button>
            </div>
        </section>

        <hr class="border-slate-800/50">

        <section class="space-y-4">
            <h2 class="text-sm font-black uppercase tracking-[0.2em] text-emerald-500 italic">Live Status</h2>
            <div id="liveList" class="space-y-3">
                <p class="text-center text-xs text-slate-600 animate-pulse">Connexion à Supabase...</p>
            </div>
        </section>

        <section class="space-y-4 pb-10">
            <h2 class="text-sm font-black uppercase tracking-[0.2em] text-amber-500 italic">Bibliothèque</h2>
            <div id="presetList" class="grid grid-cols-2 gap-3"></div>
        </section>

    </main>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-50 backdrop-blur-sm">
        <div class="glass w-full max-w-xs rounded-3xl p-6 space-y-4 shadow-2xl border-slate-700">
            <h3 class="text-center text-xs font-black uppercase text-slate-400">Assigner un écran au Slot</h3>
            <div id="screenList" class="space-y-2 max-h-[300px] overflow-y-auto pr-1"></div>
            <button onclick="closeModal()" class="w-full text-[10px] font-bold py-3 text-slate-500 uppercase hover:text-white transition-all">Annuler</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let currentAssignments = {};
        let targetSlot = null;

        // --- DÉMARRAGE ---
        async function init() {
            const { data, error } = await sbClient.from('screens_config').select('*');
            if(error) console.error(error);
            availableScreens = data || [];
            
            setupRealtime();
            renderLiveStatus();
            renderPresets();
            createGrid();
        }

        // --- REALTIME (UNE SEULE FOIS) ---
        function setupRealtime() {
            sbClient.channel('any').on('postgres_changes', 
                { event: '*', schema: 'public', table: 'screens_config' }, 
                (payload) => {
                    const { eventType, new: newRow, old: oldRow } = payload;
                    if (eventType === 'DELETE') {
                        availableScreens = availableScreens.filter(s => s.id !== oldRow.id);
                    } else if (eventType === 'INSERT') {
                        availableScreens.push(newRow);
                    } else {
                        const idx = availableScreens.findIndex(s => s.id === newRow.id);
                        if(idx !== -1) availableScreens[idx] = newRow;
                    }
                    renderLiveStatus();
                }
            ).subscribe();
        }

        // --- GRILLE DYNAMIQUE (1D ou 2D) ---
        function createGrid() {
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            const container = document.getElementById('wallGrid');
            
            container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            container.innerHTML = '';

            for(let i=0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                const div = document.createElement('div');
                div.className = `aspect-video border-2 border-dashed rounded-2xl flex flex-col items-center justify-center p-2 cursor-pointer transition-all ${screenId ? 'border-blue-500 bg-blue-500/10' : 'border-slate-800 text-slate-600 hover:border-slate-600'}`;
                
                div.innerHTML = screenId 
                    ? `<span class="text-[8px] text-blue-500 font-bold uppercase mb-1">Slot ${i}</span>
                       <span class="text-[10px] font-black text-white truncate w-full text-center">${screenId}</span>`
                    : `<span class="text-[10px] uppercase font-bold">Vide</span>`;
                
                div.onclick = () => openModal(i);
                container.appendChild(div);
            }
        }

        // --- MODAL ---
        function openModal(slotIdx) {
            targetSlot = slotIdx;
            const list = document.getElementById('screenList');
            list.innerHTML = availableScreens.length ? availableScreens.map(s => `
                <button onclick="assign('${s.id}')" class="w-full bg-slate-800/50 hover:bg-blue-600 p-4 rounded-2xl text-left text-[10px] font-black uppercase transition-all border border-slate-700">
                    ${s.id}
                </button>
            `).join('') : '<p class="text-[10px] text-center text-slate-500 py-4">Aucun écran détecté</p>';
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(id) {
            currentAssignments[targetSlot] = id;
            closeModal();
            createGrid();
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // --- DÉPLOIEMENT ---
        async function applyConfig() {
            const url = document.getElementById('videoUrl').value.trim();
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);

            if(!url) return alert("Veuillez entrer une URL vidéo");
            if(Object.keys(currentAssignments).length === 0) return alert("Assignez au moins un écran");

            for(let slot in currentAssignments) {
                const i = parseInt(slot);
                const screenId = currentAssignments[i];
                
                // Calcul des coordonnées 2D
                const posX = i % cols;
                const posY = Math.floor(i / cols);

                await sbClient.from('screens_config').update({
                    video_url: url,
                    total_cols: cols,
                    total_rows: rows,
                    pos_x: posX,
                    pos_y: posY
                }).eq('id', screenId);
            }
            alert("✅ Configuration envoyée aux écrans !");
        }

        // --- AFFICHAGE LIVE ---
        function renderLiveStatus() {
            const container = document.getElementById('liveList');
            container.innerHTML = availableScreens.map(s => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 ${s.total_cols > 1 || s.total_rows > 1 ? 'border-emerald-500 bg-emerald-500/5' : 'border-slate-700 opacity-60'}">
                    <div class="space-y-1">
                        <p class="text-xs font-black uppercase tracking-tighter">${s.id}</p>
                        <p class="text-[9px] text-slate-500 font-mono truncate w-44">${s.video_url || 'En attente...'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">${s.total_cols}x${s.total_rows}</p>
                        <p class="text-[10px] font-black text-blue-400 uppercase">X:${s.pos_x} Y:${s.pos_y}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- PRESETS (LOCAL) ---
        function renderPresets() {
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            const container = document.getElementById('presetList');
            container.innerHTML = presets.map((p, idx) => `
                <div class="glass p-4 rounded-2xl border border-amber-500/20 space-y-3">
                    <p class="text-[9px] font-black uppercase truncate text-amber-500">${p.name}</p>
                    <div class="flex gap-2">
                        <button onclick="loadPreset(${idx})" class="flex-1 bg-amber-500/10 text-amber-500 py-2 rounded-xl text-[9px] font-bold uppercase hover:bg-amber-500 hover:text-white transition-all">Lire</button>
                        <button onclick="deletePreset(${idx})" class="bg-red-500/10 text-red-500 px-3 rounded-xl text-[10px]">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function saveAsPreset() {
            const name = prompt("Nom du Preset :");
            if(!name) return;
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            presets.push({
                name,
                url: document.getElementById('videoUrl').value,
                grid: document.getElementById('gridSelect').value,
                assign: currentAssignments
            });
            localStorage.setItem('mb_presets', JSON.stringify(presets));
            renderPresets();
        }

        function loadPreset(idx) {
            const p = JSON.parse(localStorage.getItem('mb_presets'))[idx];
            document.getElementById('videoUrl').value = p.url;
            document.getElementById('gridSelect').value = p.grid;
            currentAssignments = p.assign;
            createGrid();
        }

        function deletePreset(idx) {
            let p = JSON.parse(localStorage.getItem('mb_presets'));
            p.splice(idx, 1);
            localStorage.setItem('mb_presets', JSON.stringify(p));
            renderPresets();
        }

        init();
    </script>
</body>
</html>

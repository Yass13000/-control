<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuBoard Wall</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/iconmob.png">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #F2F2F7; 
            color: #1C1C1E; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        .card { 
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.02);
            padding: 20px;
        }

        ::-webkit-scrollbar { display: none; }

        .btn-primary { 
            background: #02274e; 
            color: white; 
            transition: all 0.2s; 
        }
        .btn-primary:active { transform: scale(0.97); background: #0062CC; }
    </style>
</head>
<body class="p-4 pb-32">

    <main class="max-w-xl mx-auto space-y-6">
        <header class="flex justify-between items-end px-2 pt-2">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Centre de Contrôle</p>
                <h1 class="text-2xl font-black tracking-tight text-gray-900">MenuBoard</h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="globalStatus" class="text-[10px] font-bold px-3 py-1.5 rounded-full bg-white border border-gray-100 text-gray-400 shadow-sm uppercase">Sync...</span>
            </div>
        </header>

        <div id="zonesContainer" class="space-y-6"></div>

        <div class="space-y-4 pt-2">
            <button onclick="addZone()" class="w-full bg-white border-2 border-dashed border-gray-300 text-gray-500 hover:text-blue-500 hover:border-blue-300 hover:bg-blue-50 py-4 rounded-2xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                <span class="text-lg">+</span> Ajouter un autre Mur (Zone)
            </button>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="applyConfig()" class="btn-primary py-4 rounded-2xl font-black text-sm shadow-lg shadow-blue-500/20 uppercase">
                    APPLIQUER
                </button>
                <button onclick="saveAsPreset()" class="bg-gray-100 hover:bg-gray-200 text-gray-900 py-4 rounded-2xl font-bold text-sm transition-all">
                 SAUVEGARDER
                </button>
            </div>
        </div>

        <hr class="border-gray-200 my-8">

        <section class="card space-y-4">
            <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-3">Statut en direct</h2>
            <div id="liveList" class="space-y-3">
                <p class="text-center text-xs text-gray-400 py-4">Connexion à Supabase...</p>
            </div>
        </section>

        <section class="card space-y-4">
            <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-3">Bibliothèque Sauvegardée</h2>
            <div id="presetList" class="space-y-3"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 space-y-4 shadow-2xl">
            <h3 class="text-center text-sm font-bold text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-3">Assigner au Slot <span id="modalSlotTitle"></span></h3>
            <div id="screenList" class="space-y-2 max-h-[50vh] overflow-y-auto pr-1"></div>
            <button onclick="closeModal()" class="w-full bg-gray-100 text-gray-900 text-sm font-bold py-4 rounded-2xl mt-2 active:bg-gray-200">Annuler</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let zones = [{ id: generateId(), format: '2x2', url: '', assignments: {} }];
        let targetZoneId = null;
        let targetSlotIdx = null;

        function generateId() { return Math.random().toString(36).substr(2, 9); }

        async function init() {
            const { data, error } = await sbClient.from('screens_config').select('*');
            if(error) console.error(error);
            availableScreens = data || [];
            setupRealtime();
            renderLiveStatus();
            renderPresets();
            renderZones();
        }

        function addZone() { zones.push({ id: generateId(), format: '1x2', url: '', assignments: {} }); renderZones(); }
        function removeZone(id) { zones = zones.filter(z => z.id !== id); renderZones(); }
        function updateZoneFormat(id, format) {
            const zone = zones.find(z => z.id === id);
            if (zone) { zone.format = format; zone.assignments = {}; renderZones(); }
        }
        function updateZoneUrl(id, url) { const zone = zones.find(z => z.id === id); if (zone) zone.url = url; }

        function renderZones() {
            const container = document.getElementById('zonesContainer');
            container.innerHTML = zones.map((z, index) => {
                const [rows, cols] = z.format.split('x').map(Number);
                let gridHtml = `<div class="grid gap-3" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr))">`;
                for(let i=0; i < (rows * cols); i++) {
                    const screenId = z.assignments[i];
                    gridHtml += `
                        <div onclick="openModal('${z.id}', ${i})" class="aspect-video rounded-[16px] flex flex-col items-center justify-center p-3 cursor-pointer transition-all border-2 ${screenId ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-gray-50 border-dashed border-gray-300 text-gray-400 hover:bg-gray-100'}">
                            ${screenId ? `<span class="text-[9px] font-bold opacity-70 uppercase mb-1">Slot ${i+1}</span><span class="text-[12px] font-black truncate w-full text-center">${screenId}</span>` : `<span class="text-[11px] font-bold uppercase">+ Assigner</span>`}
                        </div>
                    `;
                }
                gridHtml += `</div>`;

                return `
                    <section class="card space-y-5 ${index === 0 ? 'border-2 border-blue-500/10' : ''}">
                        <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                            <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">Mur ${index + 1}</h2>
                            <div class="flex items-center gap-2">
                                <select onchange="updateZoneFormat('${z.id}', this.value)" class="bg-gray-100 text-gray-900 text-xs font-bold px-3 py-2 rounded-xl outline-none cursor-pointer">
                                    <option value="1x1" ${z.format === '1x1' ? 'selected' : ''}>1x1 (Solo)</option>
                                    <option value="1x2" ${z.format === '1x2' ? 'selected' : ''}>1x2 (Duo)</option>
                                    <option value="1x3" ${z.format === '1x3' ? 'selected' : ''}>1x3 (Trio)</option>
                                    <option value="1x4" ${z.format === '1x4' ? 'selected' : ''}>1x4 (Bandeau)</option>
                                    <option value="2x2" ${z.format === '2x2' ? 'selected' : ''}>2x2 (Carré)</option>
                                </select>
                                ${zones.length > 1 ? `<button onclick="removeZone('${z.id}')" class="text-red-500 bg-red-50 px-3 py-2 rounded-xl text-xs font-bold hover:bg-red-100">✕</button>` : ''}
                            </div>
                        </div>
                        ${gridHtml}
                        <div class="space-y-2 pt-2">
                            <div class="flex justify-between items-center px-1">
                                <label class="text-[11px] font-bold text-gray-500 uppercase">Vidéo Assignée au Mur ${index + 1}</label>
                                <span id="uploadStatus-${z.id}" class="text-[11px] font-medium text-blue-500"></span>
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="videoUrl-${z.id}" value="${z.url}" oninput="updateZoneUrl('${z.id}', this.value)" placeholder="Lien direct ou Drive..." 
                                    class="flex-1 bg-gray-100 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 font-mono">
                                
                                <label class="bg-gray-50 border border-gray-200 hover:bg-gray-100 p-4 rounded-2xl cursor-pointer shadow-sm flex items-center justify-center min-w-[56px] transition-all">
                                    <input type="file" class="hidden" accept="video/*" onchange="uploadMedia(this, '${z.id}')">
                                    <span id="uploadIcon-${z.id}">📁</span>
                                </label>
                            </div>
                        </div>
                    </section>
                `;
            }).join('');
        }

        // --- UPLOAD AVEC LIMITE DE POIDS ---
        async function uploadMedia(input, zoneId) {
            const file = input.files[0];
            if (!file) return;

            const icon = document.getElementById(`uploadIcon-${zoneId}`);
            const status = document.getElementById(`uploadStatus-${zoneId}`);

            const limiteMo = 200;
            const tailleFichierMo = file.size / (1024 * 1024);

            if (tailleFichierMo > limiteMo) {
                alert(`❌ Fichier trop lourd (${tailleFichierMo.toFixed(1)} Mo).\nLa limite est fixée à ${limiteMo} Mo pour garantir la fluidité.`);
                input.value = ""; 
                return;
            }

            icon.innerHTML = "⏳";
            status.innerText = "Upload...";

            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await sbClient.storage.from('medias').upload(fileName, file);

            if (error) {
                alert("Erreur: " + error.message);
                icon.innerHTML = "📁";
                status.innerText = "Erreur";
                return;
            }

            const { data: { publicUrl } } = sbClient.storage.from('medias').getPublicUrl(fileName);
            document.getElementById(`videoUrl-${zoneId}`).value = publicUrl;
            updateZoneUrl(zoneId, publicUrl);
            
            icon.innerHTML = "✅";
            status.innerText = "Prêt";
            setTimeout(() => { icon.innerHTML = "📁"; status.innerText = ""; }, 3000);
        }

        function openModal(zoneId, slotIdx) {
            targetZoneId = zoneId;
            targetSlotIdx = slotIdx;
            document.getElementById('modalSlotTitle').innerText = slotIdx + 1;
            const list = document.getElementById('screenList');
            
            list.innerHTML = availableScreens.length ? availableScreens.map(s => {
                const isOnline = isScreenOnline(s.last_ping);
                return `
                <button onclick="assign('${s.id}')" class="w-full bg-gray-50 hover:bg-blue-50 p-4 rounded-[16px] text-left transition-all flex justify-between items-center mb-2 border border-gray-100">
                    <div>
                        <p class="text-sm font-bold text-gray-900">${s.id}</p>
                        <p class="text-[10px] ${isOnline ? 'text-green-600' : 'text-red-500'} font-medium mt-0.5">${isOnline ? 'Prêt' : 'Hors ligne'}</p>
                    </div>
                    <span class="text-blue-500 font-bold text-lg">＋</span>
                </button>
            `}).join('') : '<p class="text-xs text-center text-gray-400 py-6">Aucun écran détecté</p>';
            
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(screenId) { 
            const zone = zones.find(z => z.id === targetZoneId);
            if(zone) {
                for(let key in zone.assignments) { if(zone.assignments[key] === screenId) delete zone.assignments[key]; }
                zone.assignments[targetSlotIdx] = screenId;
            }
            closeModal(); renderZones(); 
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function applyConfig() {
            let updatesCount = 0;
            let missingUrl = false;

            for(let z of zones) {
                let url = document.getElementById(`videoUrl-${z.id}`).value.trim();
                if(Object.keys(z.assignments).length > 0 && !url) { missingUrl = true; continue; }

                if (url.includes("drive.google.com") && url.includes("/d/")) {
                    const id = url.split("/d/")[1].split("/")[0];
                    url = `https://drive.google.com/uc?export=download&id=${id}`;
                }

                const [rows, cols] = z.format.split('x').map(Number);
                for(let i = 0; i < (rows * cols); i++) {
                    const screenId = z.assignments[i];
                    if(screenId) {
                        await sbClient.from('screens_config').update({
                            video_url: url, total_cols: cols, total_rows: rows,
                            pos_x: i % cols, pos_y: Math.floor(i / cols)
                        }).eq('id', screenId);
                        updatesCount++;
                    }
                }
            }
            if(missingUrl) alert("⚠️ Certains murs avaient des écrans mais pas de vidéo. Ils ont été ignorés.");
            if(updatesCount > 0) alert(`✅ ${updatesCount} écran(s) mis à jour avec succès !`);
            else alert("Rien n'a été déployé. Assurez-vous d'avoir assigné des écrans ET une vidéo.");
        }

        function setupRealtime() {
            sbClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'screens_config' }, 
                (payload) => {
                    const { eventType, new: newRow, old: oldRow } = payload;
                    if (eventType === 'DELETE') availableScreens = availableScreens.filter(s => s.id !== oldRow.id);
                    else if (eventType === 'INSERT') availableScreens.push(newRow);
                    else {
                        const idx = availableScreens.findIndex(s => s.id === newRow.id);
                        if(idx !== -1) availableScreens[idx] = newRow;
                    }
                    renderLiveStatus();
                }
            ).subscribe();
        }

        function isScreenOnline(lastPing) {
            if (!lastPing) return false;
            return ((new Date().getTime() - new Date(lastPing).getTime()) / 1000) < 45;
        }

        function renderLiveStatus() {
            const container = document.getElementById('liveList');
            let onlineCount = 0;
            const now = new Date().getTime();

            if (availableScreens.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-gray-400 py-4">Aucun appareil configuré.</p>';
                document.getElementById('globalStatus').innerText = `0/0 LIGNE`;
                return;
            }

            container.innerHTML = availableScreens.map(s => {
                let pingText = "Jamais connecté";
                let isOnline = false;
                if (s.last_ping) {
                    const diffSeconds = Math.floor((now - new Date(s.last_ping).getTime()) / 1000);
                    isOnline = diffSeconds < 45;
                    if (diffSeconds < 60) pingText = `Ping: il y a ${diffSeconds} sec`;
                    else if (diffSeconds < 3600) pingText = `Ping: il y a ${Math.floor(diffSeconds/60)} min`;
                    else pingText = `Ping: Hors ligne`;
                }
                if(isOnline) onlineCount++;

                return `
                    <div class="bg-gray-50 p-4 rounded-[16px] flex justify-between items-center border ${isOnline ? 'border-green-200' : 'border-red-100'}">
                        <div class="flex items-center gap-3">
                            <div class="relative flex h-3 w-3">
                                ${isOnline ? '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>' : ''}
                                <span class="relative inline-flex rounded-full h-3 w-3 ${isOnline ? 'bg-green-500' : 'bg-red-400'}"></span>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-900">${s.id}</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <p class="text-[10px] ${isOnline ? 'text-green-600' : 'text-red-500'} font-bold">${isOnline ? 'EN LIGNE' : 'HORS LIGNE'}</p>
                                    <span class="text-[10px] text-gray-400">• ${pingText}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="resetScreen('${s.id}')" class="text-gray-500 hover:text-blue-500 text-[10px] font-bold px-3 py-2 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50" title="Garder la TV mais la vider">Détacher</button>
                            <button onclick="deleteScreen('${s.id}')" class="text-red-500 hover:text-white hover:bg-red-500 text-[10px] font-bold px-3 py-2 bg-red-50 rounded-xl shadow-sm border border-red-100 transition-colors" title="Supprimer de la base">Supprimer</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('globalStatus').innerText = `${onlineCount}/${availableScreens.length} ACTIFS`;
        }

        async function resetScreen(id) {
            if(!confirm(`Voulez-vous vider l'écran ${id} ? (Il deviendra noir)`)) return;
            await sbClient.from('screens_config').update({ total_cols: 1, total_rows: 1, pos_x: 0, pos_y: 0, video_url: '' }).eq('id', id);
            zones.forEach(z => { for(let key in z.assignments) { if(z.assignments[key] === id) delete z.assignments[key]; } });
            renderZones();
        }

        // --- NOUVEAU : SUPPRESSION DÉFINITIVE ---
        async function deleteScreen(id) {
            if(!confirm(`⚠️ DANGER : Voulez-vous vraiment SUPPRIMER définitivement l'écran "${id}" ?\n\nIl s'éteindra et demandera à être renommé sur la TV.`)) return;
            const { error } = await sbClient.from('screens_config').delete().eq('id', id);
            if (error) { alert("Erreur de suppression : " + error.message); return; }
            zones.forEach(z => { for(let key in z.assignments) { if(z.assignments[key] === id) delete z.assignments[key]; } });
            renderZones();
        }

        function renderPresets() {
            const presets = JSON.parse(localStorage.getItem('mb_presets_v2') || '[]');
            const container = document.getElementById('presetList');
            container.innerHTML = presets.length ? presets.map((p, idx) => `
                <div class="bg-gray-50 p-4 rounded-[16px] border border-gray-100 flex justify-between items-center">
                    <div class="flex-1 pr-4 overflow-hidden">
                        <p class="text-xs font-bold text-gray-900 truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400 truncate mt-0.5">${p.zones.length} Mur(s) configuré(s)</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadPreset(${idx})" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold active:bg-blue-600">Charger</button>
                        <button onclick="deletePreset(${idx})" class="bg-white text-red-500 border border-gray-200 px-3 py-2 rounded-xl text-[10px] font-bold active:bg-gray-50">✕</button>
                    </div>
                </div>
            `).join('') : '<p class="text-xs text-center text-gray-400 py-4 italic">Aucun preset enregistré.</p>';
        }

        function saveAsPreset() {
            const name = prompt("Nom du Setup (ex: Matin Complet) :");
            if(!name) return;
            const presets = JSON.parse(localStorage.getItem('mb_presets_v2') || '[]');
            presets.push({ name, zones: JSON.parse(JSON.stringify(zones)) });
            localStorage.setItem('mb_presets_v2', JSON.stringify(presets));
            renderPresets();
        }

        function loadPreset(idx) {
            const p = JSON.parse(localStorage.getItem('mb_presets_v2'))[idx];
            zones = JSON.parse(JSON.stringify(p.zones));
            renderZones();
        }

        function deletePreset(idx) {
            if(!confirm("Supprimer ce preset ?")) return;
            let p = JSON.parse(localStorage.getItem('mb_presets_v2'));
            p.splice(idx, 1);
            localStorage.setItem('mb_presets_v2', JSON.stringify(p));
            renderPresets();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
        }

        setInterval(renderLiveStatus, 1000);
        init();
    </script>
</body>
</html>

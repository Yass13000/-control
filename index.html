<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuBoard Studio</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/iconmob.png">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Thème iOS 2026 : Soft White & System Blue */
        body { 
            background: #F2F2F7; 
            color: #1C1C1E; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Glassmorphism iOS Premium */
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: saturate(180%) blur(20px); 
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.05); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        .card-inner {
            border-radius: 24px;
        }
        
        /* Suppression des barres de défilement */
        ::-webkit-scrollbar { display: none; }

        /* Animation de pulsation subtile */
        @keyframes pulse-ios {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.98); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        .active-pulse { animation: pulse-ios 2s infinite ease-in-out; }

        /* Style des boutons iOS */
        .btn-ios-primary {
            background: #007AFF;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-ios-primary:active {
            transform: scale(0.96);
            background: #0062CC;
        }

        .btn-ios-secondary {
            background: rgba(0, 122, 255, 0.1);
            color: #007AFF;
        }
    </style>
</head>
<body class="p-4 pb-24">

    <main class="max-w-xl mx-auto space-y-8">
        <header class="flex justify-between items-end px-2 pt-4">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Architecte</p>
                <h1 class="text-2xl font-black tracking-tight text-gray-900">Mur d'écrans</h1>
            </div>
            <div class="flex flex-col items-end gap-2">
                <span id="globalStatus" class="text-[9px] font-bold px-3 py-1 rounded-full bg-white border border-gray-100 text-gray-400 shadow-sm uppercase">Sync...</span>
                <select id="gridSelect" onchange="createGrid()" class="bg-white text-gray-900 text-xs font-semibold px-3 py-2 rounded-xl border-none shadow-sm outline-none cursor-pointer">
                    <option value="1x2">1x2</option>
                    <option value="1x3">1x3</option>
                    <option value="1x4">1x4</option>
                    <option value="2x2" selected>2x2 (Carré)</option>
                </select>
            </div>
        </header>

        <section class="space-y-4">
            <div id="wallGrid" class="grid gap-4 p-2"></div>
        </section>

        <section class="glass rounded-[32px] p-6 space-y-6">
            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wide">Source Média</label>
                    <span id="uploadStatus" class="text-[11px] font-medium text-blue-500">Prêt</span>
                </div>
                <div class="flex gap-2">
                    <input id="videoUrl" type="text" placeholder="URL Drive ou lien direct..." 
                        class="flex-1 bg-gray-100/50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 transition-all">
                    
                    <label class="bg-white border border-gray-100 p-4 rounded-2xl cursor-pointer transition-all shadow-sm flex items-center justify-center min-w-[56px] active:scale-90">
                        <input type="file" id="fileUpload" class="hidden" accept="video/*" onchange="uploadMedia(this)">
                        <span id="uploadIcon">🔵</span>
                    </label>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="applyConfig()" class="btn-ios-primary py-4 rounded-2xl font-bold text-sm shadow-xl shadow-blue-500/20">
                    Déployer
                </button>
                <button onclick="saveAsPreset()" class="btn-ios-secondary py-4 rounded-2xl font-bold text-sm">
                    Sauver Preset
                </button>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 px-2">Écrans en ligne</h2>
            <div id="liveList" class="space-y-3">
                <p class="text-center text-xs text-gray-300">Recherche des terminaux...</p>
            </div>
        </section>

        <section class="space-y-4 pb-10">
            <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 px-2">Presets</h2>
            <div id="presetList" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/20 hidden items-end justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 space-y-4 shadow-2xl animate-in slide-in-from-bottom duration-300">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-2"></div>
            <h3 class="text-center text-sm font-bold text-gray-900">Assigner un écran</h3>
            <div id="screenList" class="space-y-2 max-h-[40vh] overflow-y-auto pr-1"></div>
            <button onclick="closeModal()" class="w-full text-sm font-bold py-4 text-gray-400 uppercase">Fermer</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let currentAssignments = {};
        let targetSlot = null;

        async function init() {
            const { data, error } = await sbClient.from('screens_config').select('*');
            if(error) console.error(error);
            availableScreens = data || [];
            setupRealtime();
            renderLiveStatus();
            renderPresets();
            createGrid();
        }

        async function uploadMedia(input) {
            const file = input.files[0];
            if (!file) return;
            const icon = document.getElementById('uploadIcon');
            const status = document.getElementById('uploadStatus');
            icon.innerHTML = "⏳";
            status.innerText = "Envoi...";

            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await sbClient.storage.from('medias').upload(fileName, file);

            if (error) {
                alert("Erreur: " + error.message);
                icon.innerHTML = "🔵";
                status.innerText = "Erreur";
                return;
            }

            const { data: { publicUrl } } = sbClient.storage.from('medias').getPublicUrl(fileName);
            document.getElementById('videoUrl').value = publicUrl;
            icon.innerHTML = "✅";
            status.innerText = "Terminé";
            setTimeout(() => { icon.innerHTML = "🔵"; status.innerText = "Prêt"; }, 3000);
        }

        function setupRealtime() {
            sbClient.channel('any').on('postgres_changes', 
                { event: '*', schema: 'public', table: 'screens_config' }, 
                (payload) => {
                    const { eventType, new: newRow, old: oldRow } = payload;
                    if (eventType === 'DELETE') availableScreens = availableScreens.filter(s => s.id !== oldRow.id);
                    else if (eventType === 'INSERT') availableScreens.push(newRow);
                    else {
                        const idx = availableScreens.findIndex(s => s.id === newRow.id);
                        if(idx !== -1) availableScreens[idx] = newRow;
                    }
                    renderLiveStatus();
                }
            ).subscribe();
        }

        function createGrid() {
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            const container = document.getElementById('wallGrid');
            container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            container.innerHTML = '';

            for(let i=0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                const div = document.createElement('div');
                div.className = `aspect-video rounded-[24px] flex flex-col items-center justify-center p-4 cursor-pointer transition-all shadow-sm border ${screenId ? 'bg-blue-500 text-white border-transparent' : 'bg-white border-gray-100 text-gray-300 hover:bg-gray-50'}`;
                
                div.innerHTML = screenId 
                    ? `<span class="text-[9px] font-bold opacity-70 uppercase mb-1">Slot ${i}</span>
                       <span class="text-[11px] font-black truncate w-full text-center">${screenId}</span>`
                    : `<span class="text-[11px] font-bold uppercase">Ajouter</span>`;
                
                div.onclick = () => openModal(i);
                container.appendChild(div);
            }
        }

        function openModal(slotIdx) {
            targetSlot = slotIdx;
            const list = document.getElementById('screenList');
            list.innerHTML = availableScreens.length ? availableScreens.map(s => `
                <button onclick="assign('${s.id}')" class="w-full bg-gray-50 hover:bg-blue-50 p-5 rounded-[20px] text-left text-xs font-bold transition-all text-gray-900 flex justify-between items-center">
                    ${s.id}
                    <span class="w-2 h-2 rounded-full ${getStatusColor(s.last_ping) === 'bg-green-500' ? 'bg-green-500' : 'bg-gray-200'}"></span>
                </button>
            `).join('') : '<p class="text-xs text-center text-gray-400 py-6 italic">Aucun écran disponible</p>';
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(id) { currentAssignments[targetSlot] = id; closeModal(); createGrid(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function applyConfig() {
            let url = document.getElementById('videoUrl').value.trim();
            if(!url) return alert("Source manquante");

            if (url.includes("drive.google.com") && url.includes("/d/")) {
                const id = url.split("/d/")[1].split("/")[0];
                url = `https://drive.google.com/uc?export=download&id=${id}`;
            }

            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            let updatesCount = 0;

            for(let i = 0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                if(screenId) {
                    await sbClient.from('screens_config').update({
                        video_url: url,
                        total_cols: cols,
                        total_rows: rows,
                        pos_x: i % cols,
                        pos_y: Math.floor(i / cols)
                    }).eq('id', screenId);
                    updatesCount++;
                }
            }
            if(updatesCount > 0) alert("Mise à jour réussie");
        }

        function getStatusColor(lastPing) {
            if (!lastPing) return 'bg-gray-300';
            const diff = (new Date() - new Date(lastPing)) / 1000;
            return diff < 45 ? 'bg-green-500' : 'bg-red-400';
        }

        function renderLiveStatus() {
            const container = document.getElementById('liveList');
            let onlineCount = 0;

            container.innerHTML = availableScreens.map(s => {
                const color = getStatusColor(s.last_ping);
                if(color === 'bg-green-500') onlineCount++;
                return `
                    <div class="bg-white p-4 rounded-[22px] flex justify-between items-center shadow-sm border border-gray-50">
                        <div class="flex items-center gap-4">
                            <div class="w-2.5 h-2.5 rounded-full ${color} ${color === 'bg-green-500' ? 'shadow-[0_0_10px_rgba(34,197,94,0.4)]' : ''}"></div>
                            <div>
                                <p class="text-xs font-bold text-gray-900">${s.id}</p>
                                <p class="text-[9px] text-gray-400 font-medium truncate w-32">${s.video_url ? 'Vidéo active' : 'En attente'}</p>
                            </div>
                        </div>
                        <button onclick="resetScreen('${s.id}')" class="text-gray-300 hover:text-red-500 p-2 transition-colors">✕</button>
                    </div>
                `;
            }).join('');
            document.getElementById('globalStatus').innerText = `${onlineCount}/${availableScreens.length} EN LIGNE`;
        }

        async function resetScreen(id) {
            if(!confirm(`Réinitialiser l'écran ?`)) return;
            await sbClient.from('screens_config').update({ total_cols: 1, total_rows: 1, pos_x: 0, pos_y: 0, video_url: '' }).eq('id', id);
            for(let key in currentAssignments) { if(currentAssignments[key] === id) delete currentAssignments[key]; }
            createGrid();
        }

        function renderPresets() {
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            const container = document.getElementById('presetList');
            container.innerHTML = presets.length ? presets.map((p, idx) => `
                <div class="bg-white p-4 rounded-[24px] shadow-sm border border-gray-50 space-y-4">
                    <p class="text-[10px] font-black uppercase text-blue-500 tracking-tight">${p.name}</p>
                    <div class="flex gap-2">
                        <button onclick="loadPreset(${idx})" class="flex-1 bg-gray-50 text-gray-900 py-2.5 rounded-xl text-[10px] font-bold">Lire</button>
                        <button onclick="deletePreset(${idx})" class="text-gray-200 hover:text-red-400 px-2">✕</button>
                    </div>
                </div>
            `).join('') : '<p class="col-span-2 text-center text-xs text-gray-300 py-4 italic">Aucun preset enregistré</p>';
        }

        function saveAsPreset() {
            const name = prompt("Nom du Preset :");
            if(!name) return;
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            presets.push({ name, url: document.getElementById('videoUrl').value, grid: document.getElementById('gridSelect').value, assign: currentAssignments });
            localStorage.setItem('mb_presets', JSON.stringify(presets));
            renderPresets();
        }

        function loadPreset(idx) {
            const p = JSON.parse(localStorage.getItem('mb_presets'))[idx];
            document.getElementById('videoUrl').value = p.url;
            document.getElementById('gridSelect').value = p.grid;
            currentAssignments = p.assign;
            createGrid();
        }

        function deletePreset(idx) {
            let p = JSON.parse(localStorage.getItem('mb_presets'));
            p.splice(idx, 1);
            localStorage.setItem('mb_presets', JSON.stringify(p));
            renderPresets();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
        }

        setInterval(renderLiveStatus, 15000);
        init();
    </script>
</body>
</html>

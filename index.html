<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuBoard Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui; }
        .slot { border: 2px dashed #1e293b; transition: all 0.3s; cursor: pointer; }
        .slot.active { border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">

    <main class="max-w-xl mx-auto space-y-8">
        <div class="flex justify-between items-end">
            <h1 class="text-2xl font-black italic">WALL<span class="text-blue-500 text-3xl">.</span>ENGINE</h1>
            <div id="count" class="text-[10px] font-bold bg-white/5 px-3 py-1 rounded-full text-slate-500 italic">0 ÉCRANS DÉTECTÉS</div>
        </div>

        <section class="glass p-6 rounded-[2rem] space-y-6">
            <div class="flex justify-between items-center">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Construction du Mur</p>
                <select id="gridSelect" onchange="createGrid()" class="bg-slate-800 text-xs p-1 rounded border-none outline-none">
                    <option value="2">Mur 1x2</option>
                    <option value="3">Mur 1x3</option>
                    <option value="4">Mur 1x4</option>
                </select>
            </div>

            <div id="wallGrid" class="flex gap-2 min-h-[100px]">
                </div>
            
            <p class="text-[9px] text-center text-slate-500 uppercase">Clique sur une case pour assigner un écran</p>
        </section>

        <section class="space-y-4">
            <input id="videoUrl" type="text" placeholder="Lien vidéo Google Drive..." 
                class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl p-5 text-sm focus:border-blue-500 outline-none transition-all">
            
            <button onclick="applyConfig()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/40 active:scale-95 transition-all uppercase tracking-tight">
                Appliquer au mur physique
            </button>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-50">
        <div class="glass w-full max-w-xs rounded-3xl p-6 space-y-4">
            <h3 class="text-center font-bold text-sm uppercase">Choisir l'écran</h3>
            <div id="screenList" class="space-y-2"></div>
            <button onclick="closeModal()" class="w-full text-[10px] font-bold py-2 text-slate-500 uppercase">Annuler</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let currentAssignments = {}; // { slotIndex: screenId }
        let targetSlot = null;

        async function init() {
            const { data } = await sbClient.from('screens_config').select('id');
            availableScreens = data || [];
            document.getElementById('count').innerText = `${availableScreens.length} ÉCRANS DÉTECTÉS`;
            createGrid();
        }

        function createGrid() {
            const cols = document.getElementById('gridSelect').value;
            const container = document.getElementById('wallGrid');
            container.innerHTML = '';
            currentAssignments = {};
            
            for(let i=0; i<cols; i++) {
                const div = document.createElement('div');
                div.className = "slot flex-1 rounded-2xl flex flex-col items-center justify-center text-[10px] font-bold text-slate-600 py-8";
                div.id = `slot-${i}`;
                div.innerText = `VIDE`;
                div.onclick = () => openModal(i);
                container.appendChild(div);
            }
        }

        function openModal(index) {
            targetSlot = index;
            const list = document.getElementById('screenList');
            list.innerHTML = availableScreens.map(s => `
                <button onclick="assign('${s.id}')" class="w-full bg-white/5 p-4 rounded-xl text-left hover:bg-blue-600 transition-all font-bold text-xs uppercase">
                    ${s.id}
                </button>
            `).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(id) {
            currentAssignments[targetSlot] = id;
            const el = document.getElementById(`slot-${targetSlot}`);
            el.innerText = id;
            el.classList.add('active', 'text-blue-400');
            closeModal();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function applyConfig() {
            const url = document.getElementById('videoUrl').value;
            const cols = parseInt(document.getElementById('gridSelect').value);
            
            if(!url) return alert("URL manquante");

            for(let i=0; i<cols; i++) {
                const screenId = currentAssignments[i];
                if(screenId) {
                    await sbClient.from('screens_config').update({
                        video_url: url,
                        total_cols: cols,
                        pos_x: i,
                        total_rows: 1,
                        pos_y: 0
                    }).eq('id', screenId);
                }
            }
            alert("🔥 Mur reconfiguré !");
        }

        init();
    </script>
</body>
</html>

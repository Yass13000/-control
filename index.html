<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuBoard Wall</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/iconmob.png">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #F2F2F7; 
            color: #1C1C1E; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: saturate(180%) blur(20px); 
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 0.5px solid rgba(0, 0, 0, 0.05); 
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
        }

        ::-webkit-scrollbar { display: none; }

        .btn-ios-primary { background: #007AFF; color: white; transition: all 0.2s; }
        .btn-ios-primary:active { transform: scale(0.97); background: #0062CC; }

        /* Style pour les menus déroulants (Accordéons) */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        details[open] summary ~ * {
            animation: slideDown 0.3s ease-out;
        }
        
        details summary .chevron { transition: transform 0.3s; }
        details[open] summary .chevron { transform: rotate(180deg); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 pb-24">

    <main class="max-w-xl mx-auto space-y-4">
        <header class="flex justify-between items-center px-2 pt-2 mb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-gray-900">MenuBoard Wall</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="debugForcePing()" class="bg-white text-xl p-2 rounded-full shadow-sm active:scale-90" title="Simuler un ping des écrans">⚡️</button>
                <span id="globalStatus" class="text-[10px] font-bold px-3 py-1.5 rounded-full bg-white border border-gray-100 text-gray-400 shadow-sm uppercase">Sync...</span>
            </div>
        </header>

        <details class="glass rounded-[32px] overflow-hidden" open>
            <summary class="px-6 py-5 cursor-pointer flex justify-between items-center outline-none select-none">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">1. Architecte</h2>
                <span class="chevron text-gray-400 text-xs">▼</span>
            </summary>
            
            <div class="px-6 pb-6 space-y-5 border-t border-gray-100 pt-4">
                <div class="flex justify-between items-center">
                    <label class="text-[11px] font-bold text-gray-500 uppercase">Format du mur</label>
                    <select id="gridSelect" onchange="createGrid()" class="bg-gray-100 text-gray-900 text-xs font-bold px-3 py-2 rounded-xl outline-none cursor-pointer">
                        <option value="1x2">1x2 (Duo)</option>
                        <option value="1x3">1x3 (Trio)</option>
                        <option value="1x4">1x4 (Bandeau)</option>
                        <option value="2x2" selected>2x2 (Carré)</option>
                    </select>
                </div>
                <div id="wallGrid" class="grid gap-3"></div>
            </div>
        </details>

        <details class="glass rounded-[32px] overflow-hidden" open>
            <summary class="px-6 py-5 cursor-pointer flex justify-between items-center outline-none select-none">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">2. Média & Déploiement</h2>
                <span class="chevron text-gray-400 text-xs">▼</span>
            </summary>
            
            <div class="px-6 pb-6 space-y-6 border-t border-gray-100 pt-4">
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[11px] font-bold text-gray-500 uppercase">Source Vidéo</label>
                        <span id="uploadStatus" class="text-[11px] font-medium text-blue-500">Prêt</span>
                    </div>
                    <div class="flex gap-2">
                        <input id="videoUrl" type="text" placeholder="URL Drive ou direct..." 
                            class="flex-1 bg-gray-100 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-900">
                        
                        <label class="bg-white border border-gray-100 p-4 rounded-2xl cursor-pointer shadow-sm flex items-center justify-center min-w-[56px] active:scale-90">
                            <input type="file" id="fileUpload" class="hidden" accept="video/*" onchange="uploadMedia(this)">
                            <span id="uploadIcon">🔵</span>
                        </label>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="applyConfig()" class="btn-ios-primary py-4 rounded-2xl font-bold text-sm shadow-xl shadow-blue-500/20">
                        🚀 Déployer
                    </button>
                    <button onclick="saveAsPreset()" class="bg-gray-100 text-gray-900 py-4 rounded-2xl font-bold text-sm active:scale-95 transition-all">
                        💾 Sauver Preset
                    </button>
                </div>
            </div>
        </details>

        <details class="glass rounded-[32px] overflow-hidden">
            <summary class="px-6 py-5 cursor-pointer flex justify-between items-center outline-none select-none">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">Santé des Écrans (Live)</h2>
                <span class="chevron text-gray-400 text-xs">▼</span>
            </summary>
            
            <div class="px-6 pb-6 border-t border-gray-100 pt-4">
                <div id="liveList" class="space-y-3">
                    <p class="text-center text-xs text-gray-400 py-4">Connexion...</p>
                </div>
            </div>
        </details>

        <details class="glass rounded-[32px] overflow-hidden">
            <summary class="px-6 py-5 cursor-pointer flex justify-between items-center outline-none select-none">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">Bibliothèque Presets</h2>
                <span class="chevron text-gray-400 text-xs">▼</span>
            </summary>
            
            <div class="px-6 pb-6 border-t border-gray-100 pt-4">
                <div id="presetList" class="space-y-3"></div>
            </div>
        </details>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/20 hidden items-end justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 space-y-4 shadow-2xl">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-2"></div>
            <h3 class="text-center text-sm font-bold text-gray-900">Assigner un écran</h3>
            <div id="screenList" class="space-y-2 max-h-[40vh] overflow-y-auto pr-1"></div>
            <button onclick="closeModal()" class="w-full text-sm font-bold py-4 text-gray-400 uppercase">Fermer</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let currentAssignments = {};
        let targetSlot = null;

        async function init() {
            const { data, error } = await sbClient.from('screens_config').select('*');
            if(error) console.error(error);
            availableScreens = data || [];
            setupRealtime();
            renderLiveStatus();
            renderPresets();
            createGrid();
        }

        // --- UPLOAD ---
        async function uploadMedia(input) {
            const file = input.files[0];
            if (!file) return;
            const icon = document.getElementById('uploadIcon');
            const status = document.getElementById('uploadStatus');
            icon.innerHTML = "⏳";
            status.innerText = "Envoi...";

            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await sbClient.storage.from('medias').upload(fileName, file);

            if (error) {
                alert("Erreur: " + error.message);
                icon.innerHTML = "🔵";
                status.innerText = "Erreur";
                return;
            }

            const { data: { publicUrl } } = sbClient.storage.from('medias').getPublicUrl(fileName);
            document.getElementById('videoUrl').value = publicUrl;
            icon.innerHTML = "✅";
            status.innerText = "Terminé";
            setTimeout(() => { icon.innerHTML = "🔵"; status.innerText = "Prêt"; }, 3000);
        }

        // --- SYNC ---
        function setupRealtime() {
            sbClient.channel('any').on('postgres_changes', 
                { event: '*', schema: 'public', table: 'screens_config' }, 
                (payload) => {
                    const { eventType, new: newRow, old: oldRow } = payload;
                    if (eventType === 'DELETE') availableScreens = availableScreens.filter(s => s.id !== oldRow.id);
                    else if (eventType === 'INSERT') availableScreens.push(newRow);
                    else {
                        const idx = availableScreens.findIndex(s => s.id === newRow.id);
                        if(idx !== -1) availableScreens[idx] = newRow;
                    }
                    renderLiveStatus();
                }
            ).subscribe();
        }

        // --- GRILLE ---
        function createGrid() {
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            const container = document.getElementById('wallGrid');
            container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            container.innerHTML = '';

            for(let i=0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                const div = document.createElement('div');
                div.className = `aspect-video rounded-[20px] flex flex-col items-center justify-center p-3 cursor-pointer transition-all border ${screenId ? 'bg-blue-500 text-white border-transparent shadow-md' : 'bg-gray-50 border-gray-200 text-gray-400 hover:bg-gray-100'}`;
                div.innerHTML = screenId 
                    ? `<span class="text-[9px] font-bold opacity-70 uppercase mb-1">Slot ${i+1}</span>
                       <span class="text-[11px] font-black truncate w-full text-center">${screenId}</span>`
                    : `<span class="text-[11px] font-bold uppercase">+ Ajouter</span>`;
                div.onclick = () => openModal(i);
                container.appendChild(div);
            }
        }

        function openModal(slotIdx) {
            targetSlot = slotIdx;
            const list = document.getElementById('screenList');
            list.innerHTML = availableScreens.length ? availableScreens.map(s => `
                <button onclick="assign('${s.id}')" class="w-full bg-gray-50 hover:bg-blue-50 p-4 rounded-[16px] text-left text-xs font-bold transition-all text-gray-900 flex justify-between items-center mb-2">
                    ${s.id}
                    <span class="w-2.5 h-2.5 rounded-full ${getStatusColor(s.last_ping) === 'bg-green-500' ? 'bg-green-500' : 'bg-gray-300'}"></span>
                </button>
            `).join('') : '<p class="text-xs text-center text-gray-400 py-6">Aucun écran détecté</p>';
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(id) { currentAssignments[targetSlot] = id; closeModal(); createGrid(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // --- DEPLOIEMENT ---
        async function applyConfig() {
            let url = document.getElementById('videoUrl').value.trim();
            if(!url) return alert("Source manquante !");
            if (url.includes("drive.google.com") && url.includes("/d/")) {
                const id = url.split("/d/")[1].split("/")[0];
                url = `https://drive.google.com/uc?export=download&id=${id}`;
            }

            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            let updatesCount = 0;

            for(let i = 0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                if(screenId) {
                    await sbClient.from('screens_config').update({
                        video_url: url, total_cols: cols, total_rows: rows,
                        pos_x: i % cols, pos_y: Math.floor(i / cols)
                    }).eq('id', screenId);
                    updatesCount++;
                }
            }
            if(updatesCount > 0) alert("✅ Écrans mis à jour !");
            else alert("Assignez au moins un écran.");
        }

        // --- GESTION PING & SANTÉ (CORRIGÉE) ---
        function getStatusColor(lastPing) {
            if (!lastPing) return 'bg-gray-300';
            
            // On s'assure de parser la date en UTC pour éviter les décalages horaires
            const pingDate = new Date(lastPing).getTime();
            const now = new Date().getTime();
            const diffSeconds = Math.abs((now - pingDate) / 1000);
            
            return diffSeconds < 45 ? 'bg-green-500' : 'bg-red-500';
        }

        function renderLiveStatus() {
            const container = document.getElementById('liveList');
            let onlineCount = 0;

            container.innerHTML = availableScreens.map(s => {
                const color = getStatusColor(s.last_ping);
                if(color === 'bg-green-500') onlineCount++;
                return `
                    <div class="bg-gray-50 p-4 rounded-[20px] flex justify-between items-center border border-gray-100">
                        <div class="flex items-center gap-4">
                            <div class="w-3 h-3 rounded-full ${color} shadow-sm border border-white"></div>
                            <div>
                                <p class="text-xs font-bold text-gray-900">${s.id}</p>
                                <p class="text-[10px] text-gray-400 font-medium truncate w-32">${s.video_url ? 'Média actif' : 'Vide'}</p>
                            </div>
                        </div>
                        <button onclick="resetScreen('${s.id}')" class="text-gray-400 bg-white shadow-sm hover:text-red-500 p-2 rounded-full w-8 h-8 flex items-center justify-center transition-all">✕</button>
                    </div>
                `;
            }).join('');
            document.getElementById('globalStatus').innerText = `${onlineCount}/${availableScreens.length} LIGNE`;
        }

        // ⚡️ OUTIL DE DEBUG : Forcer le ping pour tester les voyants verts
        async function debugForcePing() {
            if(availableScreens.length === 0) return alert("Aucun écran dans la base.");
            // On met à jour tous les écrans avec l'heure actuelle
            const now = new Date().toISOString();
            for(let s of availableScreens) {
                await sbClient.from('screens_config').update({ last_ping: now }).eq('id', s.id);
            }
        }

        async function resetScreen(id) {
            if(!confirm(`Réinitialiser l'écran ?`)) return;
            await sbClient.from('screens_config').update({ total_cols: 1, total_rows: 1, pos_x: 0, pos_y: 0, video_url: '' }).eq('id', id);
            for(let key in currentAssignments) { if(currentAssignments[key] === id) delete currentAssignments[key]; }
            createGrid();
        }

        // --- PRESETS ---
        function renderPresets() {
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            const container = document.getElementById('presetList');
            container.innerHTML = presets.length ? presets.map((p, idx) => `
                <div class="bg-gray-50 p-4 rounded-[20px] border border-gray-100 flex justify-between items-center">
                    <p class="text-xs font-bold text-blue-600 truncate flex-1 pr-2">${p.name}</p>
                    <div class="flex gap-2">
                        <button onclick="loadPreset(${idx})" class="bg-white text-gray-900 px-4 py-2 rounded-xl text-[10px] font-bold shadow-sm">Lire</button>
                        <button onclick="deletePreset(${idx})" class="text-gray-400 hover:text-red-500 px-2">✕</button>
                    </div>
                </div>
            `).join('') : '<p class="text-xs text-center text-gray-400 py-4">Aucun preset enregistré</p>';
        }

        function saveAsPreset() {
            const name = prompt("Nom du Preset :");
            if(!name) return;
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            presets.push({ name, url: document.getElementById('videoUrl').value, grid: document.getElementById('gridSelect').value, assign: currentAssignments });
            localStorage.setItem('mb_presets', JSON.stringify(presets));
            renderPresets();
        }

        function loadPreset(idx) {
            const p = JSON.parse(localStorage.getItem('mb_presets'))[idx];
            document.getElementById('videoUrl').value = p.url;
            document.getElementById('gridSelect').value = p.grid;
            currentAssignments = p.assign;
            createGrid();
        }

        function deletePreset(idx) {
            let p = JSON.parse(localStorage.getItem('mb_presets'));
            p.splice(idx, 1);
            localStorage.setItem('mb_presets', JSON.stringify(p));
            renderPresets();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
        }

        setInterval(renderLiveStatus, 15000);
        init();
    </script>
</body>
</html>

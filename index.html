<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuBoard Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .screen-active { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        input::placeholder { color: #475569; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-lg flex justify-between items-center mb-10">
        <div class="flex items-center gap-2">
            <div class="h-3 w-3 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="font-black text-xl tracking-tighter uppercase italic">Control<span class="text-blue-500">Wall</span></h1>
        </div>
        <button onclick="location.reload()" class="text-[10px] font-bold text-slate-500 border border-slate-800 px-3 py-1 rounded-full uppercase">Rafraîchir</button>
    </div>

    <main class="w-full max-w-lg space-y-8">

        <div class="glass rounded-[2.5rem] p-8 space-y-6">
            <p class="text-[10px] font-black text-slate-500 tracking-[0.2em] text-center uppercase">État actuel du mur</p>
            <div class="flex gap-3 h-32">
                <div id="v-left" class="flex-1 glass rounded-2xl flex flex-col items-center justify-center screen-active transition-all">
                    <span class="text-[10px] font-bold text-blue-400">GAUCHE</span>
                    <span class="text-xs opacity-30">ID: 0</span>
                </div>
                <div id="v-right" class="flex-1 glass rounded-2xl flex flex-col items-center justify-center screen-active transition-all">
                    <span class="text-[10px] font-bold text-blue-400">DROITE</span>
                    <span class="text-xs opacity-30">ID: 1</span>
                </div>
            </div>
            <button onclick="swapScreens()" class="w-full py-2 text-[10px] font-bold text-slate-400 border border-dashed border-slate-700 rounded-xl hover:bg-white/5 transition-all">
                🔄 INVERSER LES ÉCRANS (G ⟷ D)
            </button>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <input id="videoUrl" type="text" placeholder="Coller le lien de la vidéo..." 
                    class="w-full bg-slate-900 border-2 border-slate-800 rounded-[1.5rem] p-5 text-sm outline-none focus:border-blue-500 transition-all">
            </div>

            <button onclick="pushUpdate()" id="btnMain"
                class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-[1.5rem] font-black text-lg shadow-2xl shadow-blue-900/40 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                DIFFUSER SUR LE MUR
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="setMode('mirror')" class="glass py-4 rounded-2xl text-[10px] font-bold text-slate-400 hover:text-white transition-all uppercase">
                Mode Miroir
            </button>
            <button onclick="setMode('wall')" class="glass py-4 rounded-2xl text-[10px] font-bold text-blue-400 hover:text-blue-300 transition-all uppercase">
                Mode Mur 1x2
            </button>
        </div>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 transition-all duration-500 translate-y-10">
        <div class="bg-emerald-500 text-white px-8 py-3 rounded-full font-bold text-sm shadow-2xl uppercase tracking-widest">
            Synchronisé !
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        async function pushUpdate() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Colle un lien d'abord !");
            
            const btn = document.getElementById('btnMain');
            btn.innerText = "ENVOI EN COURS...";
            btn.classList.add('opacity-50');

            // Force la config mur propre
            await sbClient.from('screens_config').update({ video_url: url, total_cols: 2, total_rows: 1, pos_x: 0 }).eq('id', 'ecran_gauche');
            await sbClient.from('screens_config').update({ video_url: url, total_cols: 2, total_rows: 1, pos_x: 1 }).eq('id', 'ecran_droite');

            finishAction("DIFFUSION LANCÉE");
        }

        async function swapScreens() {
            // Récupère les positions actuelles
            const { data } = await sbClient.from('screens_config').select('id, pos_x');
            for(let s of data) {
                const newPos = s.pos_x === 0 ? 1 : 0;
                await sbClient.from('screens_config').update({ pos_x: newPos }).eq('id', s.id);
            }
            finishAction("ÉCRANS INVERSÉS");
        }

        async function setMode(mode) {
            const cols = mode === 'mirror' ? 1 : 2;
            await sbClient.from('screens_config').update({ total_cols: cols, pos_x: 0 }).neq('id', 'nothing');
            finishAction(mode === 'mirror' ? "MODE MIROIR OK" : "MODE MUR OK");
        }

        function finishAction(msg) {
            const btn = document.getElementById('btnMain');
            const toast = document.getElementById('toast');
            
            btn.innerText = "DIFFUSER SUR LE MUR";
            btn.classList.remove('opacity-50');
            
            toast.children[0].innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            toast.classList.replace('translate-y-10', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('translate-y-0', 'translate-y-10');
            }, 3000);
        }
    </script>
</body>
</html>

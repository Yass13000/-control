<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuBoard Wall</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/iconmob.png">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #F2F2F7; 
            color: #1C1C1E; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        .card { 
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.02);
            padding: 20px;
        }

        ::-webkit-scrollbar { display: none; }

        .btn-primary { 
            background: #007AFF; 
            color: white; 
            transition: all 0.2s; 
        }
        .btn-primary:active { transform: scale(0.97); background: #0062CC; }
    </style>
</head>
<body class="p-4 pb-24">

    <main class="max-w-xl mx-auto space-y-6">
        
        <header class="flex justify-between items-end px-2 pt-2">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Centre de Contrôle</p>
                <h1 class="text-2xl font-black tracking-tight text-gray-900">MenuBoard</h1>
            </div>
            <div class="flex flex-col items-end gap-2">
                <span id="globalStatus" class="text-[10px] font-bold px-3 py-1.5 rounded-full bg-white border border-gray-100 text-gray-400 shadow-sm uppercase">Sync...</span>
                <button onclick="debugForcePing()" class="text-[10px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full active:bg-blue-100">
                    ⚡️ Tester le Ping
                </button>
            </div>
        </header>

        <section class="card space-y-5">
            <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">1. Grille des Écrans</h2>
                <select id="gridSelect" onchange="createGrid()" class="bg-gray-100 text-gray-900 text-xs font-bold px-3 py-2 rounded-xl outline-none cursor-pointer">
                    <option value="1x2">1x2 (Duo)</option>
                    <option value="1x3">1x3 (Trio)</option>
                    <option value="1x4">1x4 (Bandeau)</option>
                    <option value="2x2" selected>2x2 (Carré)</option>
                </select>
            </div>
            
            <div id="wallGrid" class="grid gap-3"></div>
        </section>

        <section class="card space-y-5 border-2 border-blue-500/10">
            <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">2. Média & Déploiement</h2>
                <span id="uploadStatus" class="text-[11px] font-medium text-blue-500">Prêt</span>
            </div>
            
            <div class="flex gap-2">
                <input id="videoUrl" type="text" placeholder="URL Drive ou lien direct..." 
                    class="flex-1 bg-gray-100 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-gray-900 font-mono">
                
                <label class="bg-gray-50 border border-gray-200 hover:bg-gray-100 p-4 rounded-2xl cursor-pointer shadow-sm flex items-center justify-center min-w-[56px] transition-all">
                    <input type="file" id="fileUpload" class="hidden" accept="video/*" onchange="uploadMedia(this)">
                    <span id="uploadIcon">📁</span>
                </label>
            </div>
            
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="applyConfig()" class="btn-primary py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-500/20">
                    🚀 DÉPLOYER LE MUR
                </button>
                <button onclick="saveAsPreset()" class="bg-gray-100 hover:bg-gray-200 text-gray-900 py-4 rounded-2xl font-bold text-sm transition-all">
                    💾 Sauver Preset
                </button>
            </div>
        </section>

        <section class="card space-y-4">
            <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-3">Statut en direct (Pings)</h2>
            <div id="liveList" class="space-y-3">
                <p class="text-center text-xs text-gray-400 py-4">Connexion à Supabase...</p>
            </div>
        </section>

        <section class="card space-y-4">
            <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-3">Bibliothèque Sauvegardée</h2>
            <div id="presetList" class="space-y-3"></div>
        </section>

    </main>

    <div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 space-y-4 shadow-2xl">
            <h3 class="text-center text-sm font-bold text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-3">Assigner au Slot <span id="modalSlotTitle"></span></h3>
            <div id="screenList" class="space-y-2 max-h-[50vh] overflow-y-auto pr-1"></div>
            <button onclick="closeModal()" class="w-full bg-gray-100 text-gray-900 text-sm font-bold py-4 rounded-2xl mt-2 active:bg-gray-200">Annuler</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://bfpddpdkortuhrzxflmt.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcGRkcGRrb3J0dWhyenhmbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjMwNTgsImV4cCI6MjA5MTIzOTA1OH0.F5Rk6m8qE81UrCmhYRxRJy_QucxXX8CiIexrNDXb3ME";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        let availableScreens = [];
        let currentAssignments = {};
        let targetSlot = null;

        async function init() {
            const { data, error } = await sbClient.from('screens_config').select('*');
            if(error) console.error(error);
            availableScreens = data || [];
            setupRealtime();
            renderLiveStatus();
            renderPresets();
            createGrid();
        }

        // --- UPLOAD ---
        async function uploadMedia(input) {
            const file = input.files[0];
            if (!file) return;
            const icon = document.getElementById('uploadIcon');
            const status = document.getElementById('uploadStatus');
            icon.innerHTML = "⏳";
            status.innerText = "Upload en cours...";

            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await sbClient.storage.from('medias').upload(fileName, file);

            if (error) {
                alert("Erreur: " + error.message);
                icon.innerHTML = "📁";
                status.innerText = "Erreur";
                return;
            }

            const { data: { publicUrl } } = sbClient.storage.from('medias').getPublicUrl(fileName);
            document.getElementById('videoUrl').value = publicUrl;
            icon.innerHTML = "✅";
            status.innerText = "Fichier prêt";
            setTimeout(() => { icon.innerHTML = "📁"; status.innerText = "Prêt"; }, 3000);
        }

        // --- SYNC TEMPS RÉEL ---
        function setupRealtime() {
            sbClient.channel('any').on('postgres_changes', 
                { event: '*', schema: 'public', table: 'screens_config' }, 
                (payload) => {
                    const { eventType, new: newRow, old: oldRow } = payload;
                    if (eventType === 'DELETE') availableScreens = availableScreens.filter(s => s.id !== oldRow.id);
                    else if (eventType === 'INSERT') availableScreens.push(newRow);
                    else {
                        const idx = availableScreens.findIndex(s => s.id === newRow.id);
                        if(idx !== -1) availableScreens[idx] = newRow;
                    }
                    renderLiveStatus();
                }
            ).subscribe();
        }

        // --- GRILLE D'ASSIGNATION ---
        function createGrid() {
            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            const container = document.getElementById('wallGrid');
            container.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            container.innerHTML = '';

            for(let i=0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                const div = document.createElement('div');
                div.className = `aspect-video rounded-[16px] flex flex-col items-center justify-center p-3 cursor-pointer transition-all border-2 ${screenId ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-gray-50 border-dashed border-gray-300 text-gray-400 hover:bg-gray-100'}`;
                div.innerHTML = screenId 
                    ? `<span class="text-[9px] font-bold opacity-70 uppercase mb-1">Slot ${i+1}</span>
                       <span class="text-[12px] font-black truncate w-full text-center">${screenId}</span>`
                    : `<span class="text-[11px] font-bold uppercase">+ Assigner</span>`;
                div.onclick = () => openModal(i);
                container.appendChild(div);
            }
        }

        function openModal(slotIdx) {
            targetSlot = slotIdx;
            document.getElementById('modalSlotTitle').innerText = slotIdx + 1;
            const list = document.getElementById('screenList');
            
            list.innerHTML = availableScreens.length ? availableScreens.map(s => {
                const isOnline = isScreenOnline(s.last_ping);
                return `
                <button onclick="assign('${s.id}')" class="w-full bg-gray-50 hover:bg-blue-50 p-4 rounded-[16px] text-left transition-all flex justify-between items-center mb-2 border border-gray-100">
                    <div>
                        <p class="text-sm font-bold text-gray-900">${s.id}</p>
                        <p class="text-[10px] ${isOnline ? 'text-green-600' : 'text-red-500'} font-medium mt-0.5">${isOnline ? 'Prêt' : 'Hors ligne'}</p>
                    </div>
                    <span class="text-blue-500 font-bold text-lg">＋</span>
                </button>
            `}).join('') : '<p class="text-xs text-center text-gray-400 py-6">Aucun écran détecté dans la base</p>';
            
            document.getElementById('modal').style.display = 'flex';
        }

        function assign(id) { currentAssignments[targetSlot] = id; closeModal(); createGrid(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // --- DEPLOIEMENT ---
        async function applyConfig() {
            let url = document.getElementById('videoUrl').value.trim();
            if(!url) return alert("Veuillez renseigner une source vidéo !");
            
            if (url.includes("drive.google.com") && url.includes("/d/")) {
                const id = url.split("/d/")[1].split("/")[0];
                url = `https://drive.google.com/uc?export=download&id=${id}`;
            }

            const val = document.getElementById('gridSelect').value;
            const [rows, cols] = val.split('x').map(Number);
            let updatesCount = 0;

            for(let i = 0; i < (rows * cols); i++) {
                const screenId = currentAssignments[i];
                if(screenId) {
                    await sbClient.from('screens_config').update({
                        video_url: url, total_cols: cols, total_rows: rows,
                        pos_x: i % cols, pos_y: Math.floor(i / cols)
                    }).eq('id', screenId);
                    updatesCount++;
                }
            }
            if(updatesCount > 0) alert("✅ Le mur a été mis à jour avec succès !");
            else alert("Vous devez assigner au moins un écran dans la grille.");
        }

        // --- GESTION DES PINGS ULTRA-CLAIRE ---
        function isScreenOnline(lastPing) {
            if (!lastPing) return false;
            const pingDate = new Date(lastPing).getTime();
            const now = new Date().getTime();
            return ((now - pingDate) / 1000) < 45; // En ligne si ping < 45 secondes
        }

        function renderLiveStatus() {
            const container = document.getElementById('liveList');
            let onlineCount = 0;
            const now = new Date().getTime();

            if (availableScreens.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-gray-400 py-4">Aucun appareil configuré.</p>';
                document.getElementById('globalStatus').innerText = `0/0 EN LIGNE`;
                return;
            }

            container.innerHTML = availableScreens.map(s => {
                let pingText = "Jamais connecté";
                let isOnline = false;
                
                if (s.last_ping) {
                    const pingDate = new Date(s.last_ping).getTime();
                    const diffSeconds = Math.floor((now - pingDate) / 1000);
                    isOnline = diffSeconds < 45;
                    
                    if (diffSeconds < 60) {
                        pingText = `Ping: il y a ${diffSeconds} sec`;
                    } else if (diffSeconds < 3600) {
                        pingText = `Ping: il y a ${Math.floor(diffSeconds/60)} min`;
                    } else {
                        pingText = `Ping: Hors ligne`;
                    }
                }

                if(isOnline) onlineCount++;

                return `
                    <div class="bg-gray-50 p-4 rounded-[16px] flex justify-between items-center border ${isOnline ? 'border-green-200' : 'border-red-100'}">
                        <div class="flex items-center gap-3">
                            <div class="relative flex h-3 w-3">
                                ${isOnline ? '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>' : ''}
                                <span class="relative inline-flex rounded-full h-3 w-3 ${isOnline ? 'bg-green-500' : 'bg-red-400'}"></span>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-900">${s.id}</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <p class="text-[10px] ${isOnline ? 'text-green-600' : 'text-red-500'} font-bold">${isOnline ? 'EN LIGNE' : 'HORS LIGNE'}</p>
                                    <span class="text-[10px] text-gray-400">• ${pingText}</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="resetScreen('${s.id}')" class="text-gray-400 hover:text-red-500 text-xs font-bold px-3 py-2 bg-white rounded-xl shadow-sm border border-gray-100 active:bg-gray-50">Détacher</button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('globalStatus').innerText = `${onlineCount}/${availableScreens.length} ACTIFS`;
        }

        // SIMULATEUR DE PING (Pour tester l'interface)
        async function debugForcePing() {
            if(availableScreens.length === 0) return alert("Aucun écran trouvé.");
            const now = new Date().toISOString();
            for(let s of availableScreens) {
                await sbClient.from('screens_config').update({ last_ping: now }).eq('id', s.id);
            }
        }

        async function resetScreen(id) {
            if(!confirm(`Voulez-vous réinitialiser l'écran ${id} ? (Il deviendra noir)`)) return;
            await sbClient.from('screens_config').update({ total_cols: 1, total_rows: 1, pos_x: 0, pos_y: 0, video_url: '' }).eq('id', id);
            for(let key in currentAssignments) { if(currentAssignments[key] === id) delete currentAssignments[key]; }
            createGrid();
        }

        // --- PRESETS ---
        function renderPresets() {
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            const container = document.getElementById('presetList');
            container.innerHTML = presets.length ? presets.map((p, idx) => `
                <div class="bg-gray-50 p-4 rounded-[16px] border border-gray-100 flex justify-between items-center">
                    <div class="flex-1 pr-4 overflow-hidden">
                        <p class="text-xs font-bold text-gray-900 truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400 truncate mt-0.5">Grille: ${p.grid}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadPreset(${idx})" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold active:bg-blue-600">Charger</button>
                        <button onclick="deletePreset(${idx})" class="bg-white text-red-500 border border-gray-200 px-3 py-2 rounded-xl text-[10px] font-bold active:bg-gray-50">✕</button>
                    </div>
                </div>
            `).join('') : '<p class="text-xs text-center text-gray-400 py-4 italic">Aucun preset enregistré.</p>';
        }

        function saveAsPreset() {
            const name = prompt("Nom du Preset (ex: Promo Matin) :");
            if(!name) return;
            const presets = JSON.parse(localStorage.getItem('mb_presets') || '[]');
            presets.push({ name, url: document.getElementById('videoUrl').value, grid: document.getElementById('gridSelect').value, assign: currentAssignments });
            localStorage.setItem('mb_presets', JSON.stringify(presets));
            renderPresets();
        }

        function loadPreset(idx) {
            const p = JSON.parse(localStorage.getItem('mb_presets'))[idx];
            document.getElementById('videoUrl').value = p.url;
            document.getElementById('gridSelect').value = p.grid;
            currentAssignments = p.assign;
            createGrid();
        }

        function deletePreset(idx) {
            if(!confirm("Supprimer ce preset ?")) return;
            let p = JSON.parse(localStorage.getItem('mb_presets'));
            p.splice(idx, 1);
            localStorage.setItem('mb_presets', JSON.stringify(p));
            renderPresets();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
        }

        // Rafraichit l'interface du ping toutes les secondes pour voir le temps s'écouler !
        setInterval(renderLiveStatus, 1000);
        init();
    </script>
</body>
</html>
